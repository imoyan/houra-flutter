name: SDK Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sdk-check:
    name: Flutter SDK checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout okaka-flutter
        uses: actions/checkout@v4
        with:
          path: okaka-flutter

      - name: Checkout chawan-product-spec
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/chawan-product-spec
          path: chawan-product-spec

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: okaka-flutter
        run: flutter pub get

      - name: Check spec sync
        working-directory: okaka-flutter
        env:
          CHAWAN_SPEC_ROOT: ../chawan-product-spec
        run: dart run tool/check_spec_sync.dart

      - name: Check formatting
        working-directory: okaka-flutter
        run: dart format --set-exit-if-changed .

      - name: Analyze
        working-directory: okaka-flutter
        run: flutter analyze

      - name: Test
        working-directory: okaka-flutter
        env:
          CHAWAN_SPEC_ROOT: ../chawan-product-spec
        run: flutter test
