name: SDK Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sdk-check:
    name: Flutter SDK checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout houra-flutter
        uses: actions/checkout@v4
        with:
          path: houra-flutter

      - name: Checkout ichi-go-spec
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ichi-go-spec
          path: ichi-go-spec

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: houra-flutter
        run: flutter pub get

      - name: Check spec sync
        working-directory: houra-flutter
        env:
          ICHI_GO_SPEC_ROOT: ../ichi-go-spec
        run: dart run tool/check_spec_sync.dart

      - name: Check formatting
        working-directory: houra-flutter
        run: dart format --set-exit-if-changed .

      - name: Analyze
        working-directory: houra-flutter
        run: flutter analyze

      - name: Test
        working-directory: houra-flutter
        env:
          ICHI_GO_SPEC_ROOT: ../ichi-go-spec
        run: flutter test
