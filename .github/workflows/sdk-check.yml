name: SDK Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  HOURA_SPEC_REF: 413a3025a32521e4a707d9dd890a10b56328154e

jobs:
  sdk-check:
    name: Flutter SDK checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout houra-labs
        uses: actions/checkout@v4
        with:
          path: houra-labs

      - name: Checkout houra-spec
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/houra-spec
          ref: ${{ env.HOURA_SPEC_REF }}
          path: houra-spec

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: houra-labs
        run: flutter pub get

      - name: Check spec sync
        working-directory: houra-labs
        env:
          HOURA_SPEC_ROOT: ../houra-spec
        run: dart run tool/check_spec_sync.dart

      - name: Check formatting
        working-directory: houra-labs
        run: dart format --set-exit-if-changed .

      - name: Analyze
        working-directory: houra-labs
        run: flutter analyze

      - name: Test
        working-directory: houra-labs
        env:
          HOURA_SPEC_ROOT: ../houra-spec
        run: flutter test

  rust-protocol-core:
    name: Rust protocol core checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout houra-labs
        uses: actions/checkout@v4
        with:
          path: houra-labs

      - name: Checkout houra-spec
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/houra-spec
          ref: ${{ env.HOURA_SPEC_REF }}
          path: houra-spec

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Check Rust formatting
        working-directory: houra-labs/rust-protocol-core
        run: cargo fmt --check

      - name: Test Rust protocol core
        working-directory: houra-labs/rust-protocol-core
        env:
          HOURA_SPEC_ROOT: ../../houra-spec
        run: cargo test --locked

      - name: Check WASM wrapper formatting
        working-directory: houra-labs/rust-protocol-core-wasm
        run: cargo fmt --check

      - name: Test WASM wrapper on host
        working-directory: houra-labs/rust-protocol-core-wasm
        run: cargo test --locked

      - name: Build WASM wrapper
        working-directory: houra-labs/rust-protocol-core-wasm
        run: cargo build --locked --target wasm32-unknown-unknown

  ts-wasm-facade:
    name: TS WASM facade checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout houra-labs
        uses: actions/checkout@v4
        with:
          path: houra-labs

      - name: Checkout houra-spec
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/houra-spec
          ref: ${{ env.HOURA_SPEC_REF }}
          path: houra-spec

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: houra-labs/ts-protocol-core-wasm/package-lock.json

      - name: Install dependencies
        working-directory: houra-labs/ts-protocol-core-wasm
        run: npm ci

      - name: Typecheck TS facade
        working-directory: houra-labs/ts-protocol-core-wasm
        run: npm run typecheck

      - name: Test TS facade
        working-directory: houra-labs/ts-protocol-core-wasm
        run: npm test
