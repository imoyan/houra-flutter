name: SDK Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sdk-check:
    name: Flutter SDK checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout houra-labs
        uses: actions/checkout@v4
        with:
          path: houra-labs

      - name: Checkout houra-spec
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/houra-spec
          path: houra-spec

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: houra-labs
        run: flutter pub get

      - name: Check spec sync
        working-directory: houra-labs
        env:
          HOURA_SPEC_ROOT: ../houra-spec
        run: dart run tool/check_spec_sync.dart

      - name: Check formatting
        working-directory: houra-labs
        run: dart format --set-exit-if-changed .

      - name: Analyze
        working-directory: houra-labs
        run: flutter analyze

      - name: Test
        working-directory: houra-labs
        env:
          HOURA_SPEC_ROOT: ../houra-spec
        run: flutter test

  rust-protocol-core:
    name: Rust protocol core checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout houra-labs
        uses: actions/checkout@v4
        with:
          path: houra-labs

      - name: Checkout houra-spec
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/houra-spec
          path: houra-spec

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        working-directory: houra-labs/rust-protocol-core
        run: cargo fmt --check

      - name: Test Rust protocol core
        working-directory: houra-labs/rust-protocol-core
        env:
          HOURA_SPEC_ROOT: ../../houra-spec
        run: cargo test --locked
